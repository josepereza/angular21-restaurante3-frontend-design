<section id="reservation" class="section-padding">
  <div class="container">
    <p class="section-label" animateOnScroll>Experiencia</p>
    <h2 class="section-title" animateOnScroll>
      Reserva tu <em>Mesa</em>
    </h2>
    <p class="section-subtitle" animateOnScroll>Una velada inolvidable te espera</p>
    <div class="row justify-content-center">
      <div class="col-lg-8">
        @if (submitted()) {
          <div class="alert alert-success text-center" animateOnScroll role="alert">
            ¡Reserva confirmada! Te contactaremos pronto.
          </div>
        }
        <form (ngSubmit)="onSubmit()" class="reservation-form" animateOnScroll>
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label">Nombre Completo</label>
              <input type="text" class="form-control" placeholder="Tu nombre" [(ngModel)]="reservation().name" name="name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Correo Electrónico</label>
              <input type="email" class="form-control" placeholder="tu@email.com" [(ngModel)]="reservation().email" name="email" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Teléfono</label>
              <input type="tel" class="form-control" placeholder="+1 234 567 890" [(ngModel)]="reservation().phone" name="phone" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Fecha</label>
              <input type="date" class="form-control" [(ngModel)]="reservation().date" name="date" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Hora</label>
              <select class="form-select" [(ngModel)]="reservation().time" name="time" required style="background-image: none; -webkit-appearance: none; -moz-appearance: none; appearance: none;">
                <option value="">Seleccionar hora</option>
                @for (t of times; track t) {
                  <option [value]="t">{{ t }}</option>
                }
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Comensales</label>
              <select class="form-select" [(ngModel)]="reservation().guests" name="guests" style="background-image: none; -webkit-appearance: none; -moz-appearance: none; appearance: none;">
                @for (i of [1,2,3,4,5,6,7,8]; track i) {
                  <option [value]="i">{{ i }} {{ i === 1 ? 'persona' : 'personas' }}</option>
                }
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Petición Especial (Opcional)</label>
              <textarea class="form-control" rows="3" placeholder="Celebración, alergias, preferencias..." [(ngModel)]="reservation().message" name="message"></textarea>
            </div>
            <div class="col-12 text-center">
              <button type="submit" class="btn-reserve">Reservar Ahora</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
